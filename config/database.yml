default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= Rails.application.credentials.database_username %>
  password: <%= Rails.application.credentials.database_password %>
  host: localhost
  pool: 5
  port: 5432

development:
  <<: *default
  database: code_critic_development

test:
  <<: *default
  database: code_critic_test

production:
  <<: *default
  database: code_critic_production

# Top-level separate DBs for SolidCable / ActionCable
cable:
  <<: *default
  database: code_critic_production_cable

queue:
  <<: *default
  database: code_critic_production_queue

cache:
  <<: *default
  database: code_critic_production_cache